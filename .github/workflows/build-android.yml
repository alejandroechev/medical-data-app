name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'package.json'
      - '.github/workflows/build-android.yml'

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Android targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;27.2.12479018"

      - name: Set NDK_HOME
        run: echo "NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: Install npm dependencies
        run: npm ci

      - name: Initialize Tauri Android
        run: npx tauri android init

      - name: Copy app icons to Android project
        run: |
          cp -r src-tauri/icons/android/mipmap-* src-tauri/gen/android/app/src/main/res/
          cp -r src-tauri/icons/android/values src-tauri/gen/android/app/src/main/res/

      - name: Build Android APK (debug)
        run: npx tauri android build --debug
        env:
          VITE_STORAGE_BACKEND: automerge
          VITE_SYNC_SERVER_URL: wss://sync.stormlab.app
          VITE_AUTOMERGE_DOC_URL: automerge:3KG1BsgCVwhJp6BLwYTnCPGjBmtU

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: medtracker-android
          path: src-tauri/gen/android/app/build/outputs/apk/universal/debug/*.apk
          retention-days: 30

      - name: Get version
        id: version
        run: echo "version=$(node -p 'require("./package.json").version')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: MedTracker v${{ steps.version.outputs.version }}
          files: src-tauri/gen/android/app/build/outputs/apk/universal/debug/*.apk
          make_latest: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
